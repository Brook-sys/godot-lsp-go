name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: go test ./...
      - name: Build release artifacts
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=${GITHUB_SHA}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/Brook-sys/godot-lsp-go/internal/version.Version=${VERSION} -X github.com/Brook-sys/godot-lsp-go/internal/version.Commit=${COMMIT} -X github.com/Brook-sys/godot-lsp-go/internal/version.Date=${DATE}"

          mkdir -p dist

          build_tar() {
            os=$1
            arch=$2
            name="godot-lsp-go_${os}_${arch}"
            mkdir -p "dist/${name}"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o "dist/${name}/godot-lsp-go" ./cmd/godot-lsp-go
            tar -czf "dist/${name}.tar.gz" -C "dist/${name}" godot-lsp-go
          }

          build_zip() {
            os=$1
            arch=$2
            name="godot-lsp-go_${os}_${arch}"
            mkdir -p "dist/${name}"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o "dist/${name}/godot-lsp-go.exe" ./cmd/godot-lsp-go
            (cd "dist/${name}" && zip -q "../${name}.zip" godot-lsp-go.exe)
          }

          build_tar linux amd64
          build_tar linux arm64
          build_tar darwin amd64
          build_tar darwin arm64
          build_zip windows amd64
          build_zip windows arm64

          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
