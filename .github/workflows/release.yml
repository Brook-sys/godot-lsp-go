name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=${GITHUB_SHA}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/code-xhyun/godot-lsp-go/internal/version.Version=${VERSION} -X github.com/code-xhyun/godot-lsp-go/internal/version.Commit=${COMMIT} -X github.com/code-xhyun/godot-lsp-go/internal/version.Date=${DATE}"
          
          mkdir -p dist
          
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/godot-lsp-go ./cmd/godot-lsp-go
          tar -czvf dist/godot-lsp-go_linux_amd64.tar.gz -C dist godot-lsp-go
          
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/godot-lsp-go ./cmd/godot-lsp-go
          tar -czvf dist/godot-lsp-go_linux_arm64.tar.gz -C dist godot-lsp-go
          
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/godot-lsp-go ./cmd/godot-lsp-go
          tar -czvf dist/godot-lsp-go_darwin_amd64.tar.gz -C dist godot-lsp-go
          
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/godot-lsp-go ./cmd/godot-lsp-go
          tar -czvf dist/godot-lsp-go_darwin_arm64.tar.gz -C dist godot-lsp-go
          
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/godot-lsp-go.exe ./cmd/godot-lsp-go
          zip -j dist/godot-lsp-go_windows_amd64.zip dist/godot-lsp-go.exe
          
          GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/godot-lsp-go.exe ./cmd/godot-lsp-go
          zip -j dist/godot-lsp-go_windows_arm64.zip dist/godot-lsp-go.exe
          
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
